<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lời mời tham gia - ChiaBill</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --primary-dark: #16a34a; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.6); --text: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        /* Cố định 100vh để chống Scroll */
        body { background: radial-gradient(circle at top left, #064e3b, #0f172a); color: var(--text); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Gắn kính và thu hẹp Padding để nhét vừa trên điện thoại màn nhỏ */
        .container { max-width: 400px; width: 90%; margin: 0 auto; padding: 1.5rem 2rem; background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: zoomIn 0.5s ease-out forwards; display: flex; flex-direction: column; align-items: center;}
        
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .header-logo { width: 50px; height: 50px; margin-bottom: 0.75rem; border-radius: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .badge { display: inline-block; padding: 0.3rem 1rem; background: rgba(34, 197, 94, 0.15); color: #4ade80; border-radius: 2rem; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: 1px;}
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; color: #ffffff; }
        p { color: var(--text-muted); line-height: 1.4; margin-bottom: 1.25rem; font-size: 0.95rem; }
        
        /* Gif sinh động ở giữa */
        .hero-img { width: 100%; max-width: 220px; height: auto; border-radius: 1rem; margin-bottom: 1.25rem; border: 2px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        
        /* Nút màu chính của app */
        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 0.85rem 1.5rem; background: linear-gradient(to right, var(--primary), var(--primary-dark)); color: white; text-decoration: none; border-radius: 0.8rem; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; border: none; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(34, 197, 94, 0.4); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.5); }
        .btn-svg { width: 22px; height: 22px; margin-right: 8px; fill: currentColor; }
        
        .footer-link { margin-top: 1rem; display: inline-block; font-size: 0.85rem; color: #94a3b8; text-decoration: none; transition: color 0.3s; }
        .footer-link:hover { color: #ffffff; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Ảnh logo tải từ assets Android -->
        <img src="/images/logo.png" alt="ChiaBill" class="header-logo">
        <div class="badge">LỜI MỜI THAM GIA</div>
        <h1>ChiaBill</h1>
        <p>Bạn vừa được mời vào một nhóm chia tiền chung. Hãy chấp nhận tham gia nhé!</p>
        
        <!-- Ảnh Gif sinh động -->
        <img src="/images/join_trip.gif" alt="Tham gia" class="hero-img">
        
        <a href="{{intentUrl}}" class="btn">
            <svg class="btn-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22l10-3 10 3L12 2z"/></svg>
            MỞ ỨNG DỤNG NGAY
        </a>
        <a href="{{downloadLink}}" class="footer-link">Bạn chưa có App? Tải xuống (Google Drive)</a>
    </div>
</body>
</html>
