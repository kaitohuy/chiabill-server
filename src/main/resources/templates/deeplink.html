<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lời mời tham gia - ChiaBill</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #8bc34a; /* Xanh lá mạ tươi sáng */
            --primary-dark: #689f38; 
            --bg: #f4f9f4; /* Nền trắng hơi ám xanh lục cực nhẹ */
            --card-bg: #ffffff; /* Thẻ màu trắng tinh */
            --text: #1e293b; /* Chữ xám đậm, dễ đọc */
            --text-muted: #64748b; /* Chữ phụ xám nhạt hơn */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            /* Gradient nền dịu mắt */
            background: linear-gradient(135deg, #e8f5e9 0%, #f8fafc 100%); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .container { 
            max-width: 400px; 
            width: 90%; 
            margin: 0 auto; 
            padding: 2.5rem 2rem; 
            background: var(--card-bg); 
            border-radius: 1.5rem; 
            text-align: center; 
            box-shadow: 0 20px 40px -10px rgba(100, 116, 139, 0.12); /* Đổ bóng cực êm cho light mode */
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; /* Animation mượt hơn */
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .header-logo { 
            width: 65px; 
            height: 65px; 
            margin-bottom: 1rem; 
            border-radius: 1rem; 
            box-shadow: 0 8px 16px rgba(139, 195, 74, 0.2); 
        }
        
        .badge { 
            display: inline-block; 
            padding: 0.4rem 1.2rem; 
            background: rgba(139, 195, 74, 0.15); 
            color: var(--primary-dark); 
            border-radius: 2rem; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-bottom: 1rem; 
            letter-spacing: 0.5px;
        }
        
        h1 { 
            font-size: 1.6rem; 
            font-weight: 700; 
            margin-bottom: 0.5rem; 
            color: var(--text); 
        }
        
        p { 
            color: var(--text-muted); 
            line-height: 1.5; 
            margin-bottom: 1.5rem; 
            font-size: 0.95rem; 
        }
        
        .hero-img { 
            width: 100%; 
            max-width: 220px; 
            height: auto; 
            border-radius: 1rem; 
            margin-bottom: 1.5rem; 
        }
        
        .btn { 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
            padding: 0.85rem 1.5rem; 
            background: linear-gradient(to right, var(--primary), #7cb342); 
            color: white; 
            text-decoration: none; 
            border-radius: 0.8rem; 
            font-weight: 600; 
            font-size: 1rem; 
            transition: all 0.3s ease; 
            border: none; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(139, 195, 74, 0.3); 
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(139, 195, 74, 0.4); 
        }
        
        .btn-svg { 
            width: 22px; 
            height: 22px; 
            margin-right: 8px; 
            fill: currentColor; 
        }
        
        .footer-link { 
            margin-top: 1.2rem; 
            display: inline-block; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            text-decoration: none; 
            transition: color 0.3s; 
            font-weight: 500;
        }
        
        .footer-link:hover { 
            color: var(--primary-dark); 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">LỜI MỜI THAM GIA</div>
        <h1>ChiaBill</h1>
        <p>Bạn vừa được mời vào một nhóm chia tiền chung. Hãy mở ứng dụng để tham gia nhé!</p>
        
        <img src="/images/join_trip.gif" alt="Tham gia" class="hero-img">
        
        <a href="{{intentUrl}}" class="btn">
            <svg class="btn-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22l10-3 10 3L12 2z"/></svg>
            MỞ ỨNG DỤNG NGAY
        </a>
        <a href="{{downloadLink}}" class="footer-link">Bạn chưa có App? Tải xuống (Google Drive)</a>
    </div>
</body>
</html>
