spring.application.name=chia-bill

# Số lượng kết nối tối đa đến PostgreSQL (3 CPU nên đặt khoảng 15-20 là tối ưu)
spring.datasource.hikari.maximum-pool-size=5
# Số lượng kết nối tối thiểu được giữ rảnh rỗi
spring.datasource.hikari.minimum-idle=3
# Thời gian tối đa chờ kết nối rảnh (30 giây)
spring.datasource.hikari.idle-timeout=30000
# Thời gian tối đa một kết nối được phép tồn tại trong pool
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# SERVER PROFILE SWITCHER
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ===============================
# DATASOURCE
# ===============================
JWT_SECRET=${JWT_SECRET}
google.client-id=${GOOGLE_CLIENT_ID}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE & FLYWAY
# ===============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# LOGGING (Prod Defaults)
# ===============================
logging.level.root=INFO
logging.level.com.kaitohuy.chiabill=INFO

# cloudinary
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${API_KEY}
cloudinary.api-secret=${API_SECRET}

# ===============================
# MAIL SENDER
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FIREBASE
# ===============================
firebase.key.path=${FIREBASE_KEY_PATH:chiabill-firebase.json}

base_url=${BASE_URL}
download_link=${DOWNLOAD_LINK}
app.frontend-url=${APP_FRONTEND_URL}

# ===============================
# ANDROID APP SHA256 FINGERPRINT
# ===============================
app.sha256-fingerprint=${APP_SHA256_FINGERPRINT:FB:E3:99:0C:E9:0D:A6:17:18:AB:DA:16:2E:71:13:87:3D:A6:7F:97:EA:45:6A:78:50:2E:A4:61:13:DF:A4:97}